headless = true

# Disable custom SSL on Cloud (Streamlit Cloud manages SSL for you)
# sslCertFile = "./certs/zubeir-ai-server.crt"
# sslKeyFile = "./certs/zubeir-ai-server.key"

[client]
showErrorDetails = true